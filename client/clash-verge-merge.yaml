# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# 多节点 / 多区域 Worker 专用（新加坡 + 日本 + 美国）
# 单节点主控部署请勿使用本文件 — 会导致 Clash 日志 dial DIRECT、无法翻墙
# 单节点请仅用订阅 + 全局模式 + 手动选择 VLESS 节点，见 docs/client-setup.md
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#
# Clash Verge Rev 1.7+：订阅右键 → 编辑扩展配置，粘贴下方内容
# 且 Host Remark 必须与下方组名一致

proxy-groups:
  - name: "🚀 自动选择"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    proxies:
      - "🇸🇬 新加坡"
      - "🇯🇵 日本"
      - "🇺🇸 美国"

  - name: "🇸🇬 新加坡"
    type: select
    use:
      - filter: "新加坡|sg|SG"

  - name: "🇯🇵 日本"
    type: select
    use:
      - filter: "日本|jp|JP"

  - name: "🇺🇸 美国"
    type: select
    use:
      - filter: "美国|us|US"

  - name: "🔰 故障转移"
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    proxies:
      - "🇸🇬 新加坡"
      - "🇯🇵 日本"
      - "🇺🇸 美国"

rules:
  - GEOIP,CN,DIRECT
  - MATCH,🚀 自动选择

# Host Remark 示例见 docs/client-setup.md
